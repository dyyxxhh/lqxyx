<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>精灵图提取工具</title>
  <style>
    :root { color-scheme: dark; --bg:#111318; --panel:#1b1f2a; --muted:#8e98aa; --text:#e8edf5; --accent:#5dd6ff; --line:#30384a; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background:var(--bg); color:var(--text); }
    header { padding:14px 18px; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
    h1 { font-size:18px; margin:0 12px 0 0; }
    button, select, input { background:#0f131b; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 9px; }
    button { cursor:pointer; }
    button:hover { border-color:var(--accent); }
    button.primary { background:#12465a; border-color:#1b9ccb; }
    main { display:grid; grid-template-columns: 360px minmax(500px, 1fr) 330px; gap:12px; padding:12px; height:calc(100vh - 58px); }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px; overflow:auto; }
    .row { display:flex; align-items:center; gap:8px; margin:8px 0; flex-wrap:wrap; }
    label { color:var(--muted); font-size:13px; }
    .field { display:grid; grid-template-columns: 82px 1fr 64px; gap:8px; align-items:center; margin:8px 0; }
    .field input[type=range] { width:100%; }
    .field input[type=number] { width:64px; }
    .hint { color:var(--muted); font-size:12px; line-height:1.5; }
    #stageWrap { height:100%; display:flex; align-items:center; justify-content:center; overflow:auto; background:#090b10; border-radius:10px; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; background:#fff; }
    #previewGrid { display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; }
    .previewCard { border:1px solid var(--line); border-radius:10px; padding:8px; background:#10141d; }
    .previewCard canvas { width:100%; height:auto; background: repeating-conic-gradient(#2a3140 0% 25%, #1b2130 0% 50%) 50% / 16px 16px; border-radius:6px; }
    .previewCard b { display:block; font-size:13px; margin-bottom:6px; }
    .actions { display:grid; grid-template-columns: repeat(2, 1fr); gap:6px; }
    .mini { padding:5px 7px; font-size:12px; }
    .kbd { font-family: ui-monospace, SFMono-Regular, monospace; background:#0b0e14; padding:1px 5px; border-radius:4px; border:1px solid #31394a; }
    .status { white-space:pre-wrap; font-size:12px; color:#b6c5d8; background:#0d1018; border:1px solid var(--line); border-radius:8px; padding:8px; max-height:110px; overflow:auto; }
  </style>
</head>
<body>
<header>
  <h1>精灵图提取工具</h1>
  <label>素材</label><select id="imageSelect"></select>
  <label>角色名</label><input id="character" value="杨云" />
  <label>边框/备注</label><input id="color" placeholder="蓝边/红边/空" style="width:90px" />
  <button id="resetBtn">重置</button>
  <button id="saveAllBtn" class="primary">保存当前动作</button>
</header>
<main>
  <section class="panel">
    <h3>动作模板</h3>
    <div class="row">
      <select id="presetSelect"></select>
      <button id="applyPreset">套用</button>
    </div>
    <div class="hint">
      杨云/董继豪建议 10 张：上/下/左/右静止；上左腿/上右腿；下左腿/下右腿；左迈腿/右迈腿。<br>
      秦浩瑞/但宇轩可从 5 格生成图里裁：站立、躺、血躺、头、身体。
    </div>
    <hr style="border-color:var(--line); border-style:solid none none; margin:12px 0">
    <h3>裁剪参数</h3>
    <div class="field"><label>X</label><input id="x" type="range" min="0" max="1024" value="0"><input id="xn" type="number"></div>
    <div class="field"><label>Y</label><input id="y" type="range" min="0" max="1024" value="0"><input id="yn" type="number"></div>
    <div class="field"><label>宽</label><input id="w" type="range" min="1" max="1024" value="128"><input id="wn" type="number"></div>
    <div class="field"><label>高</label><input id="h" type="range" min="1" max="1024" value="128"><input id="hn" type="number"></div>
    <div class="field"><label>缩放</label><input id="zoom" type="range" min="10" max="400" value="100"><input id="zoomn" type="number"></div>
    <h3>微调</h3>
    <div class="actions">
      <button class="mini" data-nudge="y:-1">↑ Y-1</button><button class="mini" data-nudge="y:1">↓ Y+1</button>
      <button class="mini" data-nudge="x:-1">← X-1</button><button class="mini" data-nudge="x:1">→ X+1</button>
      <button class="mini" data-nudge="w:-1">宽-1</button><button class="mini" data-nudge="w:1">宽+1</button>
      <button class="mini" data-nudge="h:-1">高-1</button><button class="mini" data-nudge="h:1">高+1</button>
      <button class="mini" data-nudge="x:-10">X-10</button><button class="mini" data-nudge="x:10">X+10</button>
      <button class="mini" data-nudge="y:-10">Y-10</button><button class="mini" data-nudge="y:10">Y+10</button>
    </div>
    <p class="hint">键盘：方向键移动，Shift+方向键 每次 10px，Alt+左右改宽，Alt+上下改高。</p>
    <div id="status" class="status">等待加载素材…</div>
  </section>
  <section class="panel"><div id="stageWrap"><canvas id="stage"></canvas></div></section>
  <section class="panel">
    <h3>预览 / 导出</h3>
    <div class="row"><label>当前动作</label><input id="actionName" value="下-静止" /></div>
    <div class="row"><button id="downloadBtn">下载当前 PNG</button><button id="saveBtn" class="primary">保存到项目</button></div>
    <div class="row"><label>输出宽</label><input id="outW" type="number" value="128" style="width:72px"><label>高</label><input id="outH" type="number" value="128" style="width:72px"><label>脚底留空</label><input id="footPad" type="number" value="4" style="width:60px"></div>
    <div class="row"><button id="autoCurrent">自动框当前角色</button><button id="auto5">自动提取5格</button><button id="auto10">自动提取10格</button></div>
    <div class="hint">自动提取规则：透明像素=背景；非透明像素=角色。导出时会把角色贴进固定画布并让脚底/最低点对齐，适合走路动画不跳脚。</div>
    <canvas id="singlePreview" width="128" height="128" style="width:100%; background:repeating-conic-gradient(#2a3140 0% 25%, #1b2130 0% 50%) 50% / 16px 16px; border-radius:8px"></canvas>
    <h3>批量预设预览</h3>
    <div class="row"><button id="addPreview">加入预览</button><button id="clearPreview">清空</button></div>
    <div id="previewGrid"></div>
  </section>
</main>
<script>
const presets = [
  ['上-静止',0,0,128,128], ['下-静止',0,0,128,128], ['左-静止',0,0,128,128], ['右-静止',0,0,128,128],
  ['上-左腿',0,0,128,128], ['上-右腿',0,0,128,128], ['下-左腿',0,0,128,128], ['下-右腿',0,0,128,128],
  ['左-迈腿',0,0,128,128], ['右-迈腿',0,0,128,128],
  ['站立向右',0,0,205,1024], ['横躺无血',205,0,205,1024], ['横躺有血',410,0,205,1024], ['头部部件',615,0,205,1024], ['身体部件',820,0,204,1024]
];
const $ = id => document.getElementById(id);
const ids = ['x','y','w','h','zoom'];
const img = new Image();
let loadedName = '';
let previewItems = [];

function setStatus(s){ $('status').textContent = s; }
function syncNum(id){ $(id+'n').value = $(id).value; }
function syncRange(id){ $(id).value = $(id+'n').value; clamp(); draw(); }
function clamp(){
  const iw = img.naturalWidth || 1024, ih = img.naturalHeight || 1024;
  $('x').max = iw; $('w').max = iw; $('y').max = ih; $('h').max = ih;
  let x=+$('x').value, y=+$('y').value, w=+$('w').value, h=+$('h').value;
  w=Math.max(1, Math.min(w, iw)); h=Math.max(1, Math.min(h, ih));
  x=Math.max(0, Math.min(x, iw-w)); y=Math.max(0, Math.min(y, ih-h));
  $('x').value=x; $('y').value=y; $('w').value=w; $('h').value=h;
  ids.forEach(syncNum);
}
function getBox(){ clamp(); return {x:+$('x').value, y:+$('y').value, w:+$('w').value, h:+$('h').value}; }
function draw(){
  if(!img.complete || !img.naturalWidth) return;
  clamp();
  const zoom=+$('zoom').value/100;
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const stage=$('stage'), ctx=stage.getContext('2d');
  stage.width = Math.round(iw*zoom); stage.height = Math.round(ih*zoom);
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,stage.width,stage.height);
  ctx.drawImage(img,0,0,stage.width,stage.height);
  const {x,y,w,h}=getBox();
  ctx.save(); ctx.scale(zoom,zoom);
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=Math.max(1,2/zoom); ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='rgba(0,229,255,.12)'; ctx.fillRect(x,y,w,h);
  ctx.restore();
  drawSinglePreview();
  setStatus(`${loadedName}\n原图 ${iw}×${ih}\n裁剪 x=${x}, y=${y}, w=${w}, h=${h}`);
}
function drawSinglePreview(){
  const box=getBox(); const c=$('singlePreview'); const ctx=c.getContext('2d');
  const rendered = renderNormalized(box);
  c.width=rendered.width; c.height=rendered.height; ctx.imageSmoothingEnabled=false; ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(rendered, 0, 0);
}
function rawCropCanvas(box=getBox()){
  const c=document.createElement('canvas'); const ctx=c.getContext('2d');
  c.width=box.w; c.height=box.h; ctx.imageSmoothingEnabled=false; ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(img, box.x, box.y, box.w, box.h, 0, 0, box.w, box.h);
  return c;
}
function bodyAnchorX(box){
  // 角色中线不要按整张裁剪框算：持刀/武器会把 bbox 往一侧拉偏。
  // 用裁剪框下半身（大约 45%~95% 高度）的非透明像素中位数当“身体/脚底中线”。
  // 这样刀在上半身一侧时，不会影响走路动画的居中。
  const c=rawCropCanvas(box), ctx=c.getContext('2d');
  const data=ctx.getImageData(0,0,c.width,c.height).data;
  const y1=Math.floor(c.height*0.45), y2=Math.max(y1+1, Math.floor(c.height*0.95));
  const xs=[];
  for(let y=y1;y<y2;y++) for(let x=0;x<c.width;x++){
    const i=(y*c.width+x)*4;
    if(data[i+3]>8) xs.push(x);
  }
  if(xs.length<20) return box.w/2;
  xs.sort((a,b)=>a-b);
  return xs[Math.floor(xs.length/2)];
}
function renderNormalized(box=getBox()){
  const outW=Math.max(1,+$('outW').value||128), outH=Math.max(1,+$('outH').value||128), footPad=Math.max(0,+$('footPad').value||0);
  const c=document.createElement('canvas'); c.width=outW; c.height=outH;
  const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=false; ctx.clearRect(0,0,outW,outH);
  const anchorX=bodyAnchorX(box);
  // 为了让 anchorX 正好落在输出画布中线，同时保证刀/身体都尽量不被裁掉，横向按 anchor 两侧最大半径来缩放。
  const halfW=Math.max(anchorX, box.w-anchorX, 1);
  const scale=Math.min(1, outW/(halfW*2), Math.max(1,(outH-footPad))/box.h);
  const dw=Math.round(box.w*scale), dh=Math.round(box.h*scale);
  const dx=Math.round(outW/2-anchorX*scale);
  const dy=Math.round(outH-footPad-dh);
  ctx.drawImage(img, box.x, box.y, box.w, box.h, dx, dy, dw, dh);
  return c;
}
function cropCanvas(){ drawSinglePreview(); return $('singlePreview'); }
function dataUrl(){ return cropCanvas().toDataURL('image/png'); }
function downloadCurrent(){
  const a=document.createElement('a');
  a.download=`${$('character').value}-${$('color').value ? $('color').value+'-' : ''}${$('actionName').value}.png`;
  a.href=dataUrl(); a.click();
}
async function saveImages(images){
  const res=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({character:$('character').value,color:$('color').value,action:$('actionName').value,images})});
  const js=await res.json();
  setStatus(js.ok ? `已保存：\n${js.saved.join('\n')}` : `保存失败：${js.error}`);
}
async function loadImages(){
  const js=await (await fetch('/api/images')).json();
  $('imageSelect').innerHTML='';
  for(const f of js.files){ const o=document.createElement('option'); o.value=f.url; o.textContent=f.name; $('imageSelect').appendChild(o); }
  if(js.files.length) loadImage(js.files[0].url, js.files[0].name);
}
function loadImage(url,name){
  img.onload=()=>{ loadedName=name; $('x').value=0; $('y').value=0; $('w').value=Math.min(128,img.naturalWidth); $('h').value=Math.min(128,img.naturalHeight); draw(); };
  img.src=url+'?t='+Date.now();
}
function applyPreset(p){ $('actionName').value=p[0]; $('x').value=p[1]; $('y').value=p[2]; $('w').value=p[3]; $('h').value=p[4]; draw(); }
function addPreview(){
  const box=getBox(); previewItems.push({action:$('actionName').value, box, dataUrl:dataUrl()}); renderPreviewGrid();
}
function renderPreviewGrid(){
  const grid=$('previewGrid'); grid.innerHTML='';
  previewItems.forEach((it,idx)=>{
    const div=document.createElement('div'); div.className='previewCard';
    div.innerHTML=`<b>${idx+1}. ${it.action}</b><canvas></canvas><div class="hint">x=${it.box.x} y=${it.box.y} w=${it.box.w} h=${it.box.h}</div><button class="mini">删除</button>`;
    const ci=div.querySelector('canvas'), cctx=ci.getContext('2d'); const im=new Image();
    im.onload=()=>{ci.width=im.width;ci.height=im.height;cctx.imageSmoothingEnabled=false;cctx.drawImage(im,0,0)}; im.src=it.dataUrl;
    div.querySelector('button').onclick=()=>{previewItems.splice(idx,1);renderPreviewGrid();};
    grid.appendChild(div);
  });
}

function autoBoxInRegion(rx, ry, rw, rh, pad=2){
  const c=document.createElement('canvas'); c.width=rw; c.height=rh;
  const ctx=c.getContext('2d'); ctx.drawImage(img, rx, ry, rw, rh, 0, 0, rw, rh);
  const data=ctx.getImageData(0,0,rw,rh).data;
  // 自动背景：优先透明；JPG/不透明素材没有 alpha，不能按“非透明=角色”，否则整格都会被当角色。
  // 对不透明图：用边缘颜色估算背景，并跳过每格边框；这样红/蓝框不会把高度撑成整张 1280。
  const corner = (x,y)=>{ const i=(y*rw+x)*4; return [data[i],data[i+1],data[i+2],data[i+3]]; };
  const samples=[corner(0,0),corner(rw-1,0),corner(0,rh-1),corner(rw-1,rh-1),corner(Math.floor(rw/2),0),corner(Math.floor(rw/2),rh-1)];
  const bg=[0,1,2].map(k=>Math.round(samples.reduce((s,v)=>s+v[k],0)/samples.length));
  const hasTransparency = (()=>{ for(let i=3;i<data.length;i+=4) if(data[i]<240) return true; return false; })();
  const threshold = 28;
  // 不透明大图通常有整格彩色边框/分隔线；扫描时先排除边缘，避免边框被算成角色。
  const margin = hasTransparency ? 0 : Math.max(6, Math.round(Math.min(rw, rh) * 0.06));
  let minX=rw, minY=rh, maxX=-1, maxY=-1;
  for(let y=margin;y<rh-margin;y++) for(let x=margin;x<rw-margin;x++){
    const i=(y*rw+x)*4, a=data[i+3];
    let fg=false;
    if(hasTransparency) {
      fg = a>8;
    } else {
      const dr=data[i]-bg[0], dg=data[i+1]-bg[1], db=data[i+2]-bg[2];
      const dist=Math.sqrt(dr*dr+dg*dg+db*db);
      fg = dist>threshold;
    }
    if(fg){ if(x<minX)minX=x; if(y<minY)minY=y; if(x>maxX)maxX=x; if(y>maxY)maxY=y; }
  }
  if(maxX<0) return {x:rx+margin,y:ry+margin,w:Math.max(1,rw-margin*2),h:Math.max(1,rh-margin*2),empty:true};
  minX=Math.max(margin,minX-pad); minY=Math.max(margin,minY-pad); maxX=Math.min(rw-1-margin,maxX+pad); maxY=Math.min(rh-1-margin,maxY+pad);
  return {x:rx+minX, y:ry+minY, w:maxX-minX+1, h:maxY-minY+1};
}
function autoBoxesByComponents(count, pad=3){
  // 当前 PNG 素材是透明背景，但不是横向 10 等分，而是 3+3+2+2 排版。
  // 在整张图内找 alpha 连通块，再按“从上到下、从左到右”排序。
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const c=document.createElement('canvas'); c.width=iw; c.height=ih;
  const ctx=c.getContext('2d'); ctx.drawImage(img,0,0);
  const data=ctx.getImageData(0,0,iw,ih).data;
  let hasTransparency=false;
  for(let i=3;i<data.length;i+=4){ if(data[i]<240){ hasTransparency=true; break; } }
  if(!hasTransparency) return null;
  const seen=new Uint8Array(iw*ih);
  const comps=[];
  const stackX=[], stackY=[];
  for(let sy=0; sy<ih; sy++) for(let sx=0; sx<iw; sx++){
    const start=sy*iw+sx;
    if(seen[start] || data[start*4+3]<=8) continue;
    let minX=sx, maxX=sx, minY=sy, maxY=sy, area=0;
    stackX.length=0; stackY.length=0; stackX.push(sx); stackY.push(sy); seen[start]=1;
    while(stackX.length){
      const x=stackX.pop(), y=stackY.pop(); area++;
      if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
      const nb=[[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
      for(const [nx,ny] of nb){
        if(nx<0||ny<0||nx>=iw||ny>=ih) continue;
        const ni=ny*iw+nx;
        if(!seen[ni] && data[ni*4+3]>8){ seen[ni]=1; stackX.push(nx); stackY.push(ny); }
      }
    }
    const w=maxX-minX+1, h=maxY-minY+1;
    if(area>100 && w>10 && h>20) comps.push({area,x:minX,y:minY,w,h});
  }
  if(comps.length<count) return null;
  const chosen=comps.sort((a,b)=>b.area-a.area).slice(0,count);
  chosen.sort((a,b)=>a.y-b.y || a.x-b.x);
  const rows=[];
  const rowTol=Math.max(24, ih*0.06);
  for(const comp of chosen){
    let row=rows.find(r=>Math.abs(r.avgY-comp.y)<rowTol);
    if(!row){ row={avgY:comp.y, items:[]}; rows.push(row); }
    row.items.push(comp); row.avgY=row.items.reduce((s,v)=>s+v.y,0)/row.items.length;
  }
  rows.sort((a,b)=>a.avgY-b.avgY);
  return rows.flatMap(r=>r.items.sort((a,b)=>a.x-b.x)).map(b=>{
    const x=Math.max(0,b.x-pad), y=Math.max(0,b.y-pad);
    const x2=Math.min(iw-1,b.x+b.w-1+pad), y2=Math.min(ih-1,b.y+b.h-1+pad);
    return {x,y,w:x2-x+1,h:y2-y+1};
  });
}
function autoCurrentBox(){
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const b=autoBoxInRegion(0,0,iw,ih,3);
  $('x').value=b.x; $('y').value=b.y; $('w').value=b.w; $('h').value=b.h; draw();
}
function autoExtract(count){
  if(!img.naturalWidth) return;
  previewItems=[];
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const names = count===10 ? ['上-静止','下-静止','左-静止','右-静止','上-左腿','上-右腿','下-左腿','下-右腿','左-迈腿','右-迈腿'] : ['站立向右','横躺无血','横躺有血','头部部件','身体部件'];
  const componentBoxes=autoBoxesByComponents(count,3);
  for(let i=0;i<count;i++){
    let box;
    if(componentBoxes) box=componentBoxes[i];
    else {
      const rx=Math.round(i*iw/count), rx2=Math.round((i+1)*iw/count), rw=rx2-rx;
      box=autoBoxInRegion(rx,0,rw,ih,3);
    }
    const rendered=renderNormalized(box);
    previewItems.push({action:names[i]||`动作${i+1}`, box, dataUrl:rendered.toDataURL('image/png')});
  }
  renderPreviewGrid();
  if(previewItems[0]){ const b=previewItems[0].box; $('actionName').value=previewItems[0].action; $('x').value=b.x; $('y').value=b.y; $('w').value=b.w; $('h').value=b.h; draw(); }
  setStatus(`已自动提取 ${count} 格，已加入右侧预览。${componentBoxes?'使用透明连通块检测（适合当前 3+3+2+2 排版）':'使用横向等分兜底'}；脚底按输出画布底部对齐。`);
}

ids.forEach(id=>{ $(id).oninput=draw; $(id+'n').onchange=()=>syncRange(id); });
$('imageSelect').onchange=()=>loadImage($('imageSelect').value, $('imageSelect').selectedOptions[0].textContent);
$('resetBtn').onclick=()=>draw(); $('downloadBtn').onclick=downloadCurrent; $('saveBtn').onclick=()=>saveImages([{action:$('actionName').value,dataUrl:dataUrl()}]);
$('saveAllBtn').onclick=()=>saveImages(previewItems.length?previewItems.map(x=>({action:x.action,dataUrl:x.dataUrl})):[{action:$('actionName').value,dataUrl:dataUrl()}]);
$('addPreview').onclick=addPreview; $('clearPreview').onclick=()=>{previewItems=[];renderPreviewGrid();};
$('autoCurrent').onclick=autoCurrentBox; $('auto5').onclick=()=>autoExtract(5); $('auto10').onclick=()=>autoExtract(10);
$('outW').onchange=draw; $('outH').onchange=draw; $('footPad').onchange=draw;
for(const p of presets){ const o=document.createElement('option'); o.value=p[0]; o.textContent=p[0]; $('presetSelect').appendChild(o); }
$('applyPreset').onclick=()=>applyPreset(presets.find(p=>p[0]===$('presetSelect').value));
document.querySelectorAll('[data-nudge]').forEach(btn=>btn.onclick=()=>{ const [id,d]=btn.dataset.nudge.split(':'); $(id).value=+$(id).value + +d; draw(); });
document.addEventListener('keydown', e=>{
  if(['INPUT','SELECT'].includes(document.activeElement.tagName)) return;
  let step=e.shiftKey?10:1, used=true;
  if(e.altKey && e.key==='ArrowRight') $('w').value=+$('w').value+step;
  else if(e.altKey && e.key==='ArrowLeft') $('w').value=+$('w').value-step;
  else if(e.altKey && e.key==='ArrowDown') $('h').value=+$('h').value+step;
  else if(e.altKey && e.key==='ArrowUp') $('h').value=+$('h').value-step;
  else if(e.key==='ArrowRight') $('x').value=+$('x').value+step;
  else if(e.key==='ArrowLeft') $('x').value=+$('x').value-step;
  else if(e.key==='ArrowDown') $('y').value=+$('y').value+step;
  else if(e.key==='ArrowUp') $('y').value=+$('y').value-step;
  else used=false;
  if(used){ e.preventDefault(); draw(); }
});
loadImages();
</script>
</body>
</html>
